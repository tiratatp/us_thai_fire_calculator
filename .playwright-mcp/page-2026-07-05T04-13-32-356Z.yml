      - generic [ref=e896]:
        - heading "Disclaimer" [level=2] [ref=e897]
        - paragraph [ref=e898]: This is not tax advice. The information on this page is for educational purposes only and does not constitute legal, tax, or financial advice. Consult a cross-border tax professional before making any decisions.
        - paragraph [ref=e899]: Roth treatment in Thailand is UNSETTLED. Thailand does not have statutory recognition of Roth IRAs. The prevailing view among cross-border practitioners is that Thailand will tax remitted Roth withdrawals as pension income under Thai Revenue Code Section 40(1). This is an unsettled area with no binding authority.
        - paragraph [ref=e900]: Paw 162/2566 grandfathering does NOT extend to retirement accounts. Traditional IRA, Roth IRA, 401(k), and HSA distributions are considered "earned" at the time of distribution (post-2024), so no grandfathering applies. Only Cash and Taxable Brokerage balances can use the optional Jan-1-2024 snapshot for grandfathering.
      - generic [ref=e901]:
        - heading "2026 US Ordinary Income Brackets (Single)" [level=2] [ref=e902]
        - paragraph [ref=e903]: "The calculator uses the 2026 tax brackets for single filers as published by the IRS under the One Big Beautiful Bill Act (OBBBA). These are the seven marginal rates: 10%, 12%, 22%, 24%, 32%, 35%, and 37%."
        - paragraph [ref=e904]: Bracket thresholds are inflation-adjusted each year. The calculator always renders the values from src/data/constants.ts, so any update to the constants file immediately updates the methodology page.
        - link "IRS 2026 Inflation Adjustments (OBBBA)" [ref=e906] [cursor=pointer]:
          - /url: https://www.irs.gov/newsroom/irs-releases-tax-inflation-adjustments-for-tax-year-2026-including-amendments-from-the-one-big-beautiful-bill
      - generic [ref=e907]:
        - heading "2026 US Long-Term Capital Gains Brackets (Single)" [level=2] [ref=e908]
        - paragraph [ref=e909]: Long-term capital gains stack on top of ordinary income. The 0% bracket covers taxable income up to $49,450 for single filers in 2026. The 15% bracket applies from $49,451 to $545,500. The 20% bracket applies above $545,501.
        - paragraph [ref=e910]: The calculator accounts for ordinary income crowding into the LTCG brackets. If a Traditional IRA RMD pushes taxable ordinary income above $49,450, LTCG gains that would have been 0% become 15%.
        - link "IRS Topic No. 409" [ref=e912] [cursor=pointer]:
          - /url: https://www.irs.gov/taxtopics/tc409
      - generic [ref=e913]:
        - heading "2026 US Standard Deduction (Single)" [level=2] [ref=e914]
        - paragraph [ref=e915]: The standard deduction for single filers in 2026 is $16,100. This amount reduces taxable ordinary income before bracket calculation. An additional $1,600 is available for taxpayers aged 65 or older or blind.
        - paragraph [ref=e916]: The calculator uses the base single-filer amount. The user only enters a single filing status in v1.
        - link "IRS Topic No. 551" [ref=e918] [cursor=pointer]:
          - /url: https://www.irs.gov/taxtopics/tc551
      - generic [ref=e919]:
        - heading "US Net Investment Income Tax (NIIT)" [level=2] [ref=e920]
        - paragraph [ref=e921]: The NIIT imposes a 3.8% tax on the lesser of (a) net investment income or (b) modified adjusted gross income (MAGI) above the threshold. For single filers, the threshold is $200,000 and is not inflation-adjusted.
        - paragraph [ref=e922]: NIIT applies to interest, dividends, capital gains, rental income, and passive business income. Roth IRA distributions are generally excluded from NII. NIIT can be triggered by MAGI creep from Roth conversions.
        - link "IRS Topic No. 559 (IRC §1411)" [ref=e924] [cursor=pointer]:
          - /url: https://www.irs.gov/taxtopics/tc559
      - generic [ref=e925]:
        - heading "US Required Minimum Distribution (RMD) Table" [level=2] [ref=e926]
        - paragraph [ref=e927]: Required Minimum Distributions (RMDs) from Traditional IRAs and 401(k)s are calculated using the IRS Uniform Lifetime Table. The divisor depends on the account holder's age.
        - paragraph [ref=e928]: "The RMD age is 73 for those born before July 1, 1951, and 75 for those born in 1960 or later under SECURE 2.0. The calculator uses a whole-year approximation: birth year 1950 or earlier gives RMD age 73; 1951 and later gives 75."
        - link "IRS Publication 590-B (Uniform Lifetime Table)" [ref=e930] [cursor=pointer]:
          - /url: https://www.irs.gov/publications/p590b
      - generic [ref=e931]:
        - heading "SECURE 2.0 RMD Age Boundaries" [level=2] [ref=e932]
        - paragraph [ref=e933]: SECURE 2.0 raised the RMD age in phases. People born before July 1, 1951, start RMDs at age 73. People born July 2, 1951 through December 31, 1959, start at 75. Those born in 1960 and later also start at 75.
        - link "IRS Publication 590-B — SECURE 2.0 RMD age boundaries" [ref=e935] [cursor=pointer]:
          - /url: https://www.irs.gov/publications/p590b
      - generic [ref=e936]:
        - heading "Roth IRA 5-Year Rules" [level=2] [ref=e937]
        - paragraph [ref=e938]: A qualified Roth IRA distribution (tax-free earnings) requires the account to have been open for at least five tax years starting January 1 of the first contribution year, plus the account holder being age 59½, deceased, or disabled.
        - paragraph [ref=e939]: "Each conversion has its own separate 5-year clock for the 10% early withdrawal penalty on converted principal if withdrawn before age 59½. Distribution ordering rules are: (1) contributions, (2) conversions FIFO, (3) earnings."
        - link "IRS Publication 590-B" [ref=e941] [cursor=pointer]:
          - /url: https://www.irs.gov/publications/p590b
      - generic [ref=e942]:
        - heading "US 10% Early Withdrawal Penalty Exceptions" [level=2] [ref=e943]
        - paragraph [ref=e944]: "Withdrawals from Traditional IRAs and 401(k)s before age 59½ are subject to a 10% additional tax under IRC §72(t). Exceptions include: age 59½, Rule of 55 (401(k)/403(b) separation at 55+), 72(t) SEPP, Roth basis withdrawals, unreimbursed medical over 7.5% of AGI, first-time homebuyer ($10k lifetime), higher education, disability, death, and health insurance while unemployed."
        - link "IRC §72(t) — exceptions to tax on early distributions" [ref=e946] [cursor=pointer]:
          - /url: https://www.irs.gov/retirement-plans/plan-participant-employee/retirement-topics-exceptions-to-tax-on-early-distributions
      - generic [ref=e947]:
        - heading "HSA Non-Medical Withdrawals Post-Age-65" [level=2] [ref=e948]
        - paragraph [ref=e949]: After age 65, Health Savings Account (HSA) non-qualified withdrawals are subject to ordinary income tax but the 20% penalty is removed. HSA withdrawals for qualified medical expenses remain tax-free at any age.
        - paragraph [ref=e950]: HSA has no RMD requirement. In Thailand retirement, most Thai medical expenses do not qualify as US-qualified medical under IRC §213(d), so HSA effectively becomes a Traditional IRA for daily Thai spending after age 65.
        - link "IRS Publication 969" [ref=e952] [cursor=pointer]:
          - /url: https://www.irs.gov/publications/p969
      - generic [ref=e953]:
        - heading "Thai PIT Progressive Brackets" [level=2] [ref=e954]
        - paragraph [ref=e955]: "Thailand taxes personal income at progressive rates from 0% to 35%. The brackets are: 0% up to 150,000 THB, 5% from 150,001 to 300,000, 10% from 300,001 to 500,000, 15% from 500,001 to 750,000, 20% from 750,001 to 1,000,000, 25% from 1,000,001 to 2,000,000, 30% from 2,000,001 to 4,000,000, and 35% above 4,000,000 THB."
        - link "Thai Revenue Department — Personal Income Tax" [ref=e957] [cursor=pointer]:
          - /url: https://www.rd.go.th/english/6045
      - generic [ref=e958]:
        - heading "Thai Personal Allowance" [level=2] [ref=e959]
        - paragraph [ref=e960]: Every Thai tax resident gets a flat personal allowance of 60,000 THB against assessable income. Additional allowances are available for spouses, children, parents, disabled family members, and antenatal expenses.
        - link "PwC Tax Summaries — Thailand individual deductions" [ref=e962] [cursor=pointer]:
          - /url: https://taxsummaries.pwc.com/thailand/individual/deductions
      - generic [ref=e963]:
        - heading "Thai 50% Pension Deduction" [level=2] [ref=e964]
        - paragraph [ref=e965]: Pension income qualifies for a 50% deduction capped at 100,000 THB. The calculator applies this only when the optimistic regulatory scenario sets thaiPensionDeductionApplies to true. The combined cap for life insurance, pension, PVD, and RMF deductions is 500,000 THB.
        - link "PwC Tax Summaries — Thailand" [ref=e967] [cursor=pointer]:
          - /url: https://taxsummaries.pwc.com/thailand/individual/deductions
      - generic [ref=e968]:
        - heading "Por 161/2566 — Foreign Income Taxable on Remittance" [level=2] [ref=e969]
        - paragraph [ref=e970]: Effective January 1, 2024, foreign-sourced income (sections 40(1) through 40(8) of the Thai Revenue Code) becomes taxable in the year it is remitted to Thailand, regardless of when it was earned. This is governed by Revenue Department Instruction Por 161/2566.
        - link "RD Instruction Paw 161/2566 Translation" [ref=e972] [cursor=pointer]:
          - /url: https://www.hlbthai.com/wp-content/uploads/2023/09/RD-Instruction-No.-Paw161-2566-Translation.pdf
      - generic [ref=e973]:
        - heading "Paw 162/2566 — Pre-2024 Grandfathering (NOT for Retirement)" [level=2] [ref=e974]
        - paragraph [ref=e975]: Revenue Department Instruction Paw 162/2566 (November 20, 2023) provides grandfathering for income earned before January 1, 2024. Such income is NOT taxable when remitted, even if remitted in 2024 or later.
        - paragraph [ref=e976]: "However, this grandfathering does NOT extend to retirement accounts. Traditional IRA, Roth IRA, 401(k), and HSA distributions are considered \"earned\" at the time of distribution (post-2024), so no grandfathering applies. The calculator enforces this: the pre-2024 snapshot input is disabled in the UI for all retirement account types, and the engine ignores it if injected. Only Cash and Taxable Brokerage balances can use the optional Jan-1-2024 snapshot for grandfathering."
        - link "RD Instruction Paw 162/2566 — pre-2024 grandfathering" [ref=e978] [cursor=pointer]:
          - /url: https://www.hlbthai.com/wp-content/uploads/2023/09/RD-Instruction-No.-Paw161-2566-Translation.pdf
      - generic [ref=e979]:
        - heading "Thai Capital Gains on SET-Listed Shares" [level=2] [ref=e980]
        - paragraph [ref=e981]: Capital gains from the sale of SET-listed shares are exempt from Thai personal income tax for individual taxpayers. ASEAN-Link shares and mutual fund units (Royal Decree 689/2562) are also exempt. Unlisted shares and OTC securities are fully taxable at PIT rates. Digital assets traded on SEC-licensed platforms are exempt through 2029.
        - link "Stock Exchange of Thailand — Tax Information" [ref=e983] [cursor=pointer]:
          - /url: https://www.set.or.th/en/market/information/tax
      - generic [ref=e984]:
        - heading "Article 20 — Pensions and Social Security" [level=2] [ref=e985]
        - paragraph [ref=e986]: Article 20(1) grants the residence state (Thailand) exclusive taxing rights over private pensions and similar remuneration. Article 20(2) grants the paying state (US) exclusive taxing rights over social security and public pensions.
        - paragraph [ref=e987]: However, the Saving Clause (Article 1(2)) lets the US tax its citizens as if the treaty did not exist. Article 20(1) is subject to the Saving Clause, meaning both countries can tax Traditional IRA/401(k) distributions. Social Security under Article 20(2) is excepted from the Saving Clause, so Thailand cannot tax US Social Security.
        - generic [ref=e988]:
          - link "US-Thailand Tax Treaty (IRS)" [ref=e989] [cursor=pointer]:
            - /url: https://www.irs.gov/pub/irs-trty/thailand.pdf
          - text: ·
          - link "Technical Explanation (Treasury)" [ref=e990] [cursor=pointer]:
            - /url: https://www.irs.gov/pub/irs-trty/thaitech.pdf
      - generic [ref=e991]:
        - heading "Article 25 — Foreign Tax Credit (FTC)" [level=2] [ref=e992]
        - paragraph [ref=e993]: Article 25 provides relief from double taxation. The US grants a credit for Thai tax paid by a US citizen under IRC §904. Thailand grants a credit for US tax on US-source income. The FTC is limited to the domestic tax on that specific income in both directions.
        - paragraph [ref=e994]: "The calculator implements the corrected single-primary-taxer model: for each remitted income item, one country is the primary taxer per treaty article, and the other grants a limited credit. This avoids the double-credit bug that would understate total liability."
        - link "US-Thailand Tax Treaty — Article 25" [ref=e996] [cursor=pointer]:
          - /url: https://www.irs.gov/pub/irs-trty/thailand.pdf
      - generic [ref=e997]:
        - heading "Saving Clause Exceptions" [level=2] [ref=e998]
        - paragraph [ref=e999]: "The US Saving Clause (Article 1(2)) preserves US taxation of its citizens despite treaty benefits. Articles that survive for US citizens: Article 20(2) (Social Security), Article 20(5) (child support), Article 25 (FTC), Article 26 (non-discrimination), and Article 27 (Mutual Agreement Procedure). Articles that do NOT survive: Article 10 (dividends), Article 11 (interest), Article 13 (capital gains), Article 20(1) (private pensions), and Article 20(3) (annuities)."
        - link "Technical Explanation (Treasury)" [ref=e1001] [cursor=pointer]:
          - /url: https://www.irs.gov/pub/irs-trty/thaitech.pdf
      - generic [ref=e1002]:
        - heading "Treaty Re-sourcing of US-Source Pensions" [level=2] [ref=e1003]
        - paragraph [ref=e1004]: When the optimistic regulatory scenario sets treatyResourcesUsSourcePensions to true, the US treats remitted pension income as foreign-source for FTC purposes under Article 25(3). This means the US grants a foreign tax credit for Thai tax paid on that income, reducing US tax to zero. The total tax paid equals the higher of the two countries' rates.
        - paragraph [ref=e1005]: When this flag is false (pessimistic scenario), both countries tax the same income independently. The user pays the sum of both taxes — genuine double taxation.
        - link "US-Thailand Tax Treaty — Article 25(3)" [ref=e1007] [cursor=pointer]:
          - /url: https://www.irs.gov/pub/irs-trty/thailand.pdf
      - generic [ref=e1008]:
        - heading "Roth IRA Treatment in Thailand — UNSETTLED" [level=2] [ref=e1009]
        - paragraph [ref=e1010]: The US-Thailand treaty was signed in 1996, before Roth IRAs existed (created in 1997). The treaty's definition of "pension" does not distinguish Roth distributions. The US treats qualified Roth distributions as tax-free under domestic law, unaffected by the treaty.
        - paragraph [ref=e1011]: Thailand does not have statutory recognition of Roth IRAs. The prevailing view among cross-border practitioners is that Thailand will tax remitted Roth withdrawals as pension income under §40(1). This is an UNSETTLED area with no binding authority. The calculator treats Roth as Thailand-taxable in the pessimistic scenario and provides an optimistic toggle.
        - link "Expat Tax Thailand — Your Questions Answered" [ref=e1013] [cursor=pointer]:
          - /url: https://www.expattaxthailand.com/your-questions-answered/
      - generic [ref=e1014]:
        - heading "Corrected FTC — Single Primary Taxer Per Item" [level=2] [ref=e1015]
        - paragraph [ref=e1016]: "The calculator implements a corrected Foreign Tax Credit model based on the Oracle critique (Systemic #1). Instead of double-crediting Thai tax against US tax AND US tax against Thai tax on the same income, the model assigns exactly one primary taxer per income item per treaty article."
        - paragraph [ref=e1017]: For US-source pensions (Traditional IRA/401(k)/Roth remittances), Thailand is the primary taxer under Article 20(1). The US grants an FTC = min(usTaxOnItem, thaiTaxOnItem). For capital gains remittances, Thailand is primary under Article 13.
        - paragraph [ref=e1018]: "Walkthrough example (Oracle D3): $50,000 Traditional IRA remitted at FX 35 = 1,750,000 THB. US tax on $50,000 ordinary ≈ $3,850. Thai PIT on 1,750,000 THB (after deductions) ≈ 262,500 THB ≈ $7,500. With treaty re-sourcing (optimistic): US FTC = min($3,850, $7,500) = $3,850, US net = $0, total = $7,500. Without re-sourcing (pessimistic): US $3,850 + Thai $7,500 = $11,350 total. The primary taxer model ensures the user always pays at least the higher of the two rates."
        - 'link "Oracle Critique — Systemic #1 Double-FTC Bug" [ref=e1020] [cursor=pointer]':
          - /url: https://github.com/tiratatp/us_thai_fire_calculator/blob/main/.research/07-oracle-critique.md
      - generic [ref=e1021]:
        - 'heading "Roth Conversion Value Test (Oracle Systemic #2)" [level=2] [ref=e1022]'
        - paragraph [ref=e1023]: The calculator does NOT default to "fill the 12% bracket" with Roth conversions. For a Thai resident, a Roth conversion costs US out-of-pocket tax with zero Thai benefit (since no remittance means no Thai tax, and no Thai tax means no FTC to absorb the US cost). The conversion must pass a value test.
        - paragraph [ref=e1024]: "The value test only returns a positive conversion amount when: (a) age is below RMD age, (b) Traditional US balance is positive, (c) the 0% LTCG bracket is NOT being used for taxable harvest this year (the two compete for the same bracket space), and (d) forecasted future US marginal rate on RMDs exceeds current US marginal rate plus Thai marginal rate on eventual remittance."
        - paragraph [ref=e1025]: For a Thai-resident user at typical FIRE balances, the value test almost always returns 0 because future RMDs are trivial and there is no Thai FTC to justify prepaying US tax. The algorithm does not fill 12% with conversions — it only converts if the value test clears.
        - 'link "Oracle Critique — Systemic #2 Roth Ladder Collapse" [ref=e1027] [cursor=pointer]':
          - /url: https://github.com/tiratatp/us_thai_fire_calculator/blob/main/.research/07-oracle-critique.md
      - generic [ref=e1028]:
        - heading "Thai Residency as a Control Lever (<180 Days)" [level=2] [ref=e1029]
        - paragraph [ref=e1030]: A dual citizen spending fewer than 180 days in Thailand in a given year is NOT a Thai tax resident that year. Foreign-sourced income remitted during a non-resident year triggers zero Thai tax.
        - paragraph [ref=e1031]: "This is a powerful planning lever: bunch Roth conversions or capital gain realizations into non-resident years to avoid Thai tax entirely. Pre-position cash in Thailand during non-resident years to minimize future remittances."
        - link "Oracle Critique — D1b Residency Lever" [ref=e1033] [cursor=pointer]:
          - /url: https://github.com/tiratatp/us_thai_fire_calculator/blob/main/.research/07-oracle-critique.md
      - generic [ref=e1034]:
        - heading "Monte Carlo Default Assumptions" [level=2] [ref=e1035]
        - paragraph [ref=e1036]: "The calculator uses Vanguard VCMM forward-looking return forecasts as defaults: US Equities 6% mean / 17% vol, International Developed 6% / 19%, US Aggregate Bonds 4% / 7%, Cash 3.5% / 1%. US inflation defaults to 3% mean / 1.4% std dev. Thai inflation defaults to 2% / 2.5%. USD/THB FX defaults to a random walk centered at 35 THB/USD with 8% annual log-vol."
        - paragraph [ref=e1037]: The default number of trials is 1,000 (fast in-browser). Users can adjust upward to 10,000 for higher confidence. Success rate is the fraction of trials where the portfolio stays positive through life expectancy with no unmet spending year.
        - link "Vanguard VCMM Return Forecasts (2026)" [ref=e1039] [cursor=pointer]:
          - /url: https://corporate.vanguard.com/content/corporatesite/us/en/corp/vemo/vemo-return-forecasts.html
      - generic [ref=e1040]:
        - heading "Correlation Matrix" [level=2] [ref=e1041]
        - paragraph [ref=e1042]: The Monte Carlo engine draws correlated returns across four asset classes using Cholesky decomposition. The default 4x4 correlation matrix (ordered US Stock, US Bond, Intl Stock, Cash) is based on cFIREsim and Portfolio Visualizer data.
        - link "cFIREsim FAQ; Portfolio Visualizer" [ref=e1044] [cursor=pointer]:
          - /url: https://www.portfoliovisualizer.com/monte-carlo-simulation
      - generic [ref=e1045]:
        - 'heading "PRNG: Mulberry32 Seeded Random Number Generator" [level=2] [ref=e1046]'
        - paragraph [ref=e1047]: The Monte Carlo engine uses the Mulberry32 PRNG, a 32-bit fast PRNG that passes the gjrand statistical tests. It accepts a numeric seed, producing deterministic sequences — identical seeds yield byte-identical return paths. Box-Muller pairs convert uniform random draws into standard normal variates for correlated asset returns.
        - link "Mulberry32 by Tommy Ettinger (gjrand tests)" [ref=e1049] [cursor=pointer]:
