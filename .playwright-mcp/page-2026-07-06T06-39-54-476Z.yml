  - main [ref=e12]:
    - tabpanel "Gap-Year Strategy — Escaping Thai PIT in a Single Calendar Year" [ref=e159]:
      - heading "Gap-Year Strategy — Escaping Thai PIT in a Single Calendar Year" [level=1] [ref=e160]
      - paragraph [ref=e161]:
        - text: Thai tax residency is decided year by year by a
        - strong [ref=e162]: 180-day physical-presence test
        - text: under
        - link "Section 41 of the Thai Revenue Code" [ref=e163] [cursor=pointer]:
          - /url: https://www.rd.go.th/english/6045
        - text: . Spend fewer than 180 days in Thailand in a given calendar year and you are
        - strong [ref=e164]: not a Thai tax resident
        - text: that year — foreign-source remittances brought in during that year fall outside Thailand's taxing jurisdiction under Section 41 paragraph 2. This is a
        - strong [ref=e165]: statutory result
        - text: ", not a loophole, and its practitioner-consensus reading is confirmed in the guidance issued around"
        - link "RD Instruction Paw 161/2566" [ref=e166] [cursor=pointer]:
          - /url: https://www.hlbthai.com/wp-content/uploads/2023/09/RD-Instruction-No.-Paw161-2566-Translation.pdf
        - text: .
      - navigation "On this page" [ref=e167]:
        - list [ref=e168]:
          - listitem [ref=e169]:
            - link "What is a gap year?" [ref=e170] [cursor=pointer]:
              - /url: "#gap-year-what"
          - listitem [ref=e171]:
            - link "When does it make sense?" [ref=e172] [cursor=pointer]:
              - /url: "#gap-year-when"
          - listitem [ref=e173]:
            - link "What to do during a gap year?" [ref=e174] [cursor=pointer]:
              - /url: "#gap-year-how"
          - listitem [ref=e175]:
